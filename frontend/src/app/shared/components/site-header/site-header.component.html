<nav class="nav" [class.nav--scrolled]="navScrolled">
  <div class="nav__container">
    <a class="nav__logo" routerLink="/">
      <div class="logo-circle">
        <lucide-icon name="bike" [size]="24"></lucide-icon>
      </div>
      <div class="logo-text">
        <span class="logo-name">Nduthi</span><span class="logo-accent">Ride</span>
      </div>
    </a>

    <div class="nav__links">
      <a href="/#how-it-works">How It Works</a>
      <a href="/#features">Features</a>
      <a href="/#about">About</a>
      <a href="/#account-types">Accounts</a>
      <a href="/#faq">FAQ</a>
    </div>

    <div class="nav__actions">
      @if (auth.isAuth()) {
        <button class="nav__notif-btn" type="button" [routerLink]="[dashboardPath(), 'notifications']" aria-label="Notifications">
          <lucide-icon name="bell" [size]="18"></lucide-icon>
          @if (unreadNotifications() > 0) {
            <span class="nav__notif-badge">{{ unreadNotifications() > 9 ? '9+' : unreadNotifications() }}</span>
          }
        </button>
      }
      <button class="theme-toggle" type="button" (click)="toggleTheme()" aria-label="Toggle theme">
        <lucide-icon [name]="isDark() ? 'sun' : 'moon'" [size]="18"></lucide-icon>
      </button>
      @if (auth.isAuth()) {
        <div class="nav__session">
          <span class="nav__session-name" [attr.title]="auth.user()?.fullName ?? ''">
            {{ sessionFirstName() }}
          </span>
          <a [routerLink]="dashboardPath()" class="btn btn--primary nav__session-dashboard">Dashboard</a>
          <button
            type="button"
            class="btn btn--ghost nav__session-signout"
            (click)="logout()"
            aria-label="Sign out"
          >
            <lucide-icon name="log-out" [size]="16" class="nav__session-signout-icon" aria-hidden="true"></lucide-icon>
            <span class="nav__session-signout-text">Sign out</span>
          </button>
        </div>
      } @else {
        <a routerLink="/auth/login" class="btn btn--ghost nav__desktop-only">Sign In</a>
        <a routerLink="/auth/register" class="btn btn--primary nav__desktop-only">Get Started</a>
      }

      <!-- Hamburger — mobile only -->
      <button
        class="nav__hamburger"
        type="button"
        (click)="toggleMenu()"
        [attr.aria-expanded]="menuOpen()"
        aria-label="Toggle navigation menu"
      >
        <lucide-icon [name]="menuOpen() ? 'x' : 'menu'" [size]="22"></lucide-icon>
      </button>
    </div>
  </div>
</nav>

<!-- Mobile menu drawer -->
<div class="nav__drawer" [class.nav__drawer--open]="menuOpen()" (click)="toggleMenu()">
  <div class="nav__drawer-panel" (click)="$event.stopPropagation()">
    <div class="nav__drawer-links">
      <a href="/#how-it-works" (click)="toggleMenu()">How It Works</a>
      <a href="/#features" (click)="toggleMenu()">Features</a>
      <a href="/#about" (click)="toggleMenu()">About</a>
      <a href="/#account-types" (click)="toggleMenu()">Accounts</a>
      <a href="/#faq" (click)="toggleMenu()">FAQ</a>
    </div>

    @if (!auth.isAuth()) {
      <div class="nav__drawer-actions">
        <a routerLink="/auth/login" class="btn btn--ghost btn--full" (click)="toggleMenu()">Sign In</a>
        <a routerLink="/auth/register" class="btn btn--primary btn--full" (click)="toggleMenu()">Get Started</a>
      </div>
    }
  </div>
</div>
