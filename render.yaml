services:
  - type: web
    name: nduthiride-backend
    runtime: node
    rootDir: backend
    # NODE_ENV=production omits devDependencies by default; Nest/Prisma/TS need them to build.
    buildCommand: npm ci --include=dev && npm run build
    startCommand: node dist/main.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000

      # ── Database ──────────────────────────────────────────
      - key: DATABASE_URL
        sync: false

      # ── App URLs ──────────────────────────────────────────
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false

      # ── JWT ───────────────────────────────────────────────
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d

      # ── Lipana (M-Pesa STK Push) ──────────────────────────
      - key: LIPANA_SECRET_KEY
        sync: false
      - key: LIPANA_PUBLISHABLE_KEY
        sync: false
      - key: LIPANA_WEBHOOK_SECRET
        sync: false

      # ── Cloudinary ────────────────────────────────────────
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

      # ── SMTP ──────────────────────────────────────────────
      - key: MAIL_HOST
        sync: false
      - key: MAIL_PORT
        value: 587
      - key: MAIL_USER
        sync: false
      - key: MAIL_PASS
        sync: false
      - key: MAIL_FROM_NAME
        value: NduthiRide
      - key: MAIL_FROM_ADDRESS
        sync: false
      - key: OTP_EXPIRES_MINS
        value: 10

      # ── Firebase (push notifications) ─────────────────────
      - key: FIREBASE_SERVICE_ACCOUNT
        sync: false

      # ── SMS ───────────────────────────────────────────────
      - key: SMS_API_KEY
        sync: false
      - key: SMS_USERNAME
        sync: false
      - key: SMS_SENDER_ID
        value: NduthiRide
