services:
  - type: web
    name: nduthiride-backend
    runtime: node
    # NODE_ENV=production omits devDependencies by default; Nest/Prisma/TS need them to build.
    buildCommand: cd backend && npm ci --include=dev && npm run build
    startCommand: node backend/dist/main.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000

      # ── Database ──────────────────────────────────────────
      - key: DATABASE_URL
        sync: false

      # ── App URLs ──────────────────────────────────────────
      - key: FRONTEND_URL
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false

      # ── JWT ───────────────────────────────────────────────
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d

      # ── Cloudinary ────────────────────────────────────────
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

      # ── SMTP (Brevo) ──────────────────────────────────────
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: SENDER_EMAIL
        sync: false
      - key: OTP_EXPIRES_MINS
        value: 10

      # ── M-Pesa ────────────────────────────────────────────
      - key: MPESA_CONSUMER_KEY
        sync: false
      - key: MPESA_CONSUMER_SECRET
        sync: false
      - key: MPESA_SHORTCODE
        sync: false
      - key: MPESA_PASSKEY
        sync: false
      - key: MPESA_CALLBACK_URL
        sync: false
      - key: MPESA_API_URL
        sync: false
      - key: LIPANA_WEBHOOK_SECRET
        sync: false

      # ── Firebase (push notifications) ─────────────────────
      - key: FIREBASE_SERVICE_ACCOUNT
        sync: false

      # ── SMS ───────────────────────────────────────────────
      - key: SMS_API_KEY
        sync: false
      - key: SMS_USERNAME
        sync: false
      - key: SMS_SENDER_ID
        value: NduthiRide
